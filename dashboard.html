<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>devcoach — knowledge dashboard</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --surface: #242424;
      --surface-hover: #2e2e2e;
      --border: #333;
      --text: #e8e8e8;
      --text-muted: #888;
      --accent: #d97706;
      --l0: #555;
      --l1: #6b7280;
      --l2: #2563eb;
      --l3: #16a34a;
      --gap: #dc2626;
      --font-mono: 'SF Mono', 'Cascadia Code', 'Fira Code', 'JetBrains Mono', monospace;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
      padding: 2rem;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 2.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }

    header h1 {
      font-family: var(--font-mono);
      font-size: 1.4rem;
      font-weight: 500;
      color: var(--accent);
      margin-bottom: 0.25rem;
    }

    header h1 span {
      color: var(--text-muted);
      font-weight: 400;
    }

    .profile {
      display: flex;
      gap: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      font-family: var(--font-mono);
      margin-top: 0.75rem;
    }

    .profile-item span {
      color: var(--text);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.25rem;
      text-align: center;
    }

    .stat-card .number {
      font-family: var(--font-mono);
      font-size: 2rem;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 0.25rem;
    }

    .stat-card .label {
      font-size: 0.75rem;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .stat-card.l0 .number { color: var(--l0); }
    .stat-card.l1 .number { color: var(--l1); }
    .stat-card.l2 .number { color: var(--l2); }
    .stat-card.l3 .number { color: var(--l3); }

    section {
      margin-bottom: 2.5rem;
    }

    section h2 {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }

    .concept-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .concept {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      transition: background 0.15s;
      cursor: pointer;
    }

    .concept:hover {
      background: var(--surface-hover);
    }

    .concept.expanded {
      flex-wrap: wrap;
    }

    .level-badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      min-width: 2rem;
      text-align: center;
      color: #fff;
      flex-shrink: 0;
    }

    .level-badge.l0 { background: var(--l0); }
    .level-badge.l1 { background: var(--l1); }
    .level-badge.l2 { background: var(--l2); }
    .level-badge.l3 { background: var(--l3); }

    .concept-name {
      font-weight: 500;
      flex-grow: 1;
    }

    .concept-meta {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    .concept-details {
      width: 100%;
      padding-top: 0.75rem;
      margin-top: 0.75rem;
      border-top: 1px solid var(--border);
      font-size: 0.85rem;
      color: var(--text-muted);
      display: none;
    }

    .concept.expanded .concept-details {
      display: block;
    }

    .concept-details .detail-row {
      margin-bottom: 0.4rem;
    }

    .concept-details .detail-label {
      color: var(--text-muted);
      font-family: var(--font-mono);
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .concept-details .detail-value {
      color: var(--text);
      margin-top: 0.15rem;
    }

    .history-item {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.3rem 0;
      border-bottom: 1px solid var(--border);
    }

    .history-item:last-child { border-bottom: none; }

    .history-level {
      display: inline-block;
      width: 1.5rem;
    }

    .misconception {
      background: rgba(220, 38, 38, 0.1);
      border: 1px solid rgba(220, 38, 38, 0.2);
      border-radius: 4px;
      padding: 0.4rem 0.6rem;
      margin-top: 0.3rem;
      font-size: 0.8rem;
      color: #fca5a5;
    }

    .gap-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .gap-tag {
      background: rgba(220, 38, 38, 0.15);
      border: 1px solid rgba(220, 38, 38, 0.3);
      color: #fca5a5;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
    }

    .empty-state {
      color: var(--text-muted);
      font-style: italic;
      font-size: 0.9rem;
      padding: 1rem 0;
    }

    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 3rem 2rem;
      text-align: center;
      margin-bottom: 2rem;
      transition: border-color 0.2s, background 0.2s;
    }

    .drop-zone.active {
      border-color: var(--accent);
      background: rgba(217, 119, 6, 0.05);
    }

    .drop-zone p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
    }

    .drop-zone code {
      font-family: var(--font-mono);
      color: var(--accent);
      font-size: 0.85rem;
    }

    .file-input {
      display: none;
    }

    .browse-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 0.75rem;
      transition: background 0.15s;
    }

    .browse-btn:hover {
      background: var(--surface-hover);
    }

    .level-bar {
      display: flex;
      gap: 3px;
      margin-top: 0.5rem;
    }

    .level-segment {
      height: 4px;
      flex: 1;
      border-radius: 2px;
      background: var(--border);
    }

    .level-segment.filled.l0 { background: var(--l0); }
    .level-segment.filled.l1 { background: var(--l1); }
    .level-segment.filled.l2 { background: var(--l2); }
    .level-segment.filled.l3 { background: var(--l3); }

    #dashboard { display: none; }

    .tier-tabs {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1.5rem;
    }

    .tier-tab {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }

    .tier-tab:hover { background: var(--surface-hover); }
    .tier-tab.active {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(217, 119, 6, 0.1);
    }

    @media (max-width: 600px) {
      body { padding: 1rem; }
      .stats { grid-template-columns: repeat(2, 1fr); }
      .profile { flex-direction: column; gap: 0.5rem; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loader">
      <header>
        <h1>devcoach <span>/ knowledge dashboard</span></h1>
      </header>
      <div class="drop-zone" id="dropZone">
        <p>Drop your <code>knowledge.json</code> here</p>
        <p style="font-size: 0.75rem; color: var(--text-muted);">
          Found at <code>.devcoach/knowledge.json</code> (project) or <code>~/.devcoach/knowledge.json</code> (root)
        </p>
        <button class="browse-btn" onclick="document.getElementById('fileInput').click()">or browse</button>
        <input type="file" id="fileInput" class="file-input" accept=".json">
      </div>
    </div>

    <div id="dashboard">
      <header>
        <h1>devcoach <span>/ knowledge dashboard</span></h1>
        <div class="profile">
          <div class="profile-item">dev: <span id="devName">—</span></div>
          <div class="profile-item">project: <span id="devProject">—</span></div>
          <div class="profile-item">stack: <span id="devStack">—</span></div>
        </div>
      </header>

      <div class="stats">
        <div class="stat-card l3">
          <div class="number" id="countL3">0</div>
          <div class="label">Internalized</div>
        </div>
        <div class="stat-card l2">
          <div class="number" id="countL2">0</div>
          <div class="label">Applied</div>
        </div>
        <div class="stat-card l1">
          <div class="number" id="countL1">0</div>
          <div class="label">Exposed</div>
        </div>
        <div class="stat-card l0">
          <div class="number" id="countL0">0</div>
          <div class="label">Encountered</div>
        </div>
      </div>

      <section id="conceptsSection">
        <h2>Concepts</h2>
        <div class="concept-list" id="conceptList"></div>
      </section>

      <section id="gapsSection">
        <h2>Gaps</h2>
        <div class="gap-list" id="gapList"></div>
      </section>

      <div style="text-align: center; margin-top: 3rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
        <button class="browse-btn" onclick="reset()">Load another file</button>
      </div>
    </div>
  </div>

  <script>
    const levelNames = ['L0', 'L1', 'L2', 'L3'];
    const levelLabels = ['Encountered', 'Exposed', 'Applied', 'Internalized'];

    function render(data) {
      document.getElementById('loader').style.display = 'none';
      document.getElementById('dashboard').style.display = 'block';

      const profile = data.dev_profile || {};
      document.getElementById('devName').textContent = profile.name || 'unknown';
      document.getElementById('devProject').textContent = profile.current_project || '—';
      document.getElementById('devStack').textContent = (profile.stack || []).join(', ') || '—';

      const concepts = data.concepts || [];
      const gaps = data.gaps || [];

      // counts
      const counts = [0, 0, 0, 0];
      concepts.forEach(c => {
        const lvl = typeof c.level === 'number' ? c.level : 0;
        if (lvl >= 0 && lvl <= 3) counts[lvl]++;
      });
      document.getElementById('countL0').textContent = counts[0];
      document.getElementById('countL1').textContent = counts[1];
      document.getElementById('countL2').textContent = counts[2];
      document.getElementById('countL3').textContent = counts[3];

      // concepts sorted by level desc
      const sorted = [...concepts].sort((a, b) => (b.level || 0) - (a.level || 0));
      const list = document.getElementById('conceptList');
      list.innerHTML = '';

      if (sorted.length === 0) {
        list.innerHTML = '<div class="empty-state">No concepts tracked yet. Start a devcoach session to begin.</div>';
      }

      sorted.forEach(c => {
        const lvl = typeof c.level === 'number' ? c.level : 0;
        const name = c.name || c.id || 'unnamed';
        const lastSeen = c.last_seen || c.last_touched || '';

        const el = document.createElement('div');
        el.className = 'concept';
        el.onclick = () => el.classList.toggle('expanded');

        let detailsHTML = '';

        if (c.notes) {
          detailsHTML += `<div class="detail-row"><div class="detail-label">Notes</div><div class="detail-value">${esc(c.notes)}</div></div>`;
        }

        if (c.misconceptions_cleared && c.misconceptions_cleared.length > 0) {
          detailsHTML += `<div class="detail-row"><div class="detail-label">Misconceptions Cleared</div>`;
          c.misconceptions_cleared.forEach(m => {
            detailsHTML += `<div class="misconception">${esc(m)}</div>`;
          });
          detailsHTML += `</div>`;
        }

        if (c.level_history && c.level_history.length > 0) {
          detailsHTML += `<div class="detail-row"><div class="detail-label">History</div>`;
          c.level_history.forEach(h => {
            detailsHTML += `<div class="history-item"><span class="history-level">L${h.level}</span> ${esc(h.date || '')} — ${esc(h.signal || h.context || '')}</div>`;
          });
          detailsHTML += `</div>`;
        }

        if (c.related && c.related.length > 0) {
          detailsHTML += `<div class="detail-row"><div class="detail-label">Related</div><div class="detail-value">${c.related.map(esc).join(', ')}</div></div>`;
        }

        el.innerHTML = `
          <span class="level-badge l${lvl}">${levelNames[lvl]}</span>
          <span class="concept-name">${esc(name)}</span>
          <span class="concept-meta">${lastSeen}</span>
          <div class="concept-details">${detailsHTML || '<div class="empty-state">No additional details</div>'}</div>
        `;

        list.appendChild(el);
      });

      // gaps
      const gapList = document.getElementById('gapList');
      gapList.innerHTML = '';

      if (gaps.length === 0) {
        gapList.innerHTML = '<div class="empty-state">No gaps identified yet.</div>';
      }

      gaps.forEach(g => {
        const tag = document.createElement('span');
        tag.className = 'gap-tag';
        tag.textContent = g;
        gapList.appendChild(tag);
      });
    }

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str;
      return d.innerHTML;
    }

    function reset() {
      document.getElementById('loader').style.display = 'block';
      document.getElementById('dashboard').style.display = 'none';
    }

    function loadFile(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        try {
          const data = JSON.parse(e.target.result);
          render(data);
        } catch (err) {
          alert('Could not parse JSON: ' + err.message);
        }
      };
      reader.readAsText(file);
    }

    // drag and drop
    const dropZone = document.getElementById('dropZone');

    dropZone.addEventListener('dragover', (e) => {
      e.preventDefault();
      dropZone.classList.add('active');
    });

    dropZone.addEventListener('dragleave', () => {
      dropZone.classList.remove('active');
    });

    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('active');
      if (e.dataTransfer.files.length) loadFile(e.dataTransfer.files[0]);
    });

    document.getElementById('fileInput').addEventListener('change', (e) => {
      if (e.target.files.length) loadFile(e.target.files[0]);
    });
  </script>
</body>
</html>
